<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal — JW Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #1A1A1A; --smoke: #2E2E2E; --fog: #7A7A7A;
            --silver: #C2C2C2; --platinum: #F4F4F2; --white: #ffffff;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--platinum); min-height: 100vh; display: flex; flex-direction: column; cursor: none; overflow-x: hidden; }
        
        /* Visually hidden utility class for accessibility */
        .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
        
        /* Optimized Grain Effect */
        body::after { content: ""; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 9000; }

        .cursor { width: 8px; height: 8px; background: var(--silver); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width 0.2s, height 0.2s, background 0.2s; will-change: transform; }
        .cursor.active { width: 12px; height: 12px; background: var(--platinum); }

        nav { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 56px; border-bottom: 0.5px solid rgba(244,244,242,0.07); position: relative; z-index: 10; flex-shrink: 0; }
        .nav-logo-word { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 20px; letter-spacing: 0.08em; color: var(--platinum); text-decoration: none; }
        .nav-right { font-size: 9px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(244,244,242,0.25); display: flex; align-items: center; gap: 10px; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px 24px; position: relative; z-index: 1; }
        .screen { display: none; width: 100%; max-width: 520px; }
        .screen.active { display: block; }

        .screen-label { font-size: 9px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--silver); display: flex; align-items: center; gap: 14px; margin-bottom: 40px; }
        .screen-label::before { content: ""; width: 28px; height: 0.5px; background: var(--silver); display: block; }
        .screen-headline { font-family: 'DM Serif Display', serif; font-size: clamp(40px, 6vw, 56px); line-height: 0.92; color: var(--platinum); margin-bottom: 16px; font-weight: 400; }
        .screen-headline em { font-style: italic; color: var(--silver); }
        .screen-sub { font-size: 14px; font-weight: 300; color: var(--fog); line-height: 1.85; margin-bottom: 48px; }

        .login-input { width: 100%; background: rgba(244,244,242,0.04); border: 0.5px solid rgba(244,244,242,0.14); border-radius: 1px; padding: 18px 20px; font-size: 16px; color: var(--platinum); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; margin-bottom: 12px; }
        .login-input::placeholder { color: rgba(244,244,242,0.2); }
        .login-btn { display: block; width: 100%; background: var(--platinum); color: var(--ink); padding: 17px; border-radius: 1px; font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; border: none; cursor: none; transition: background 0.2s; text-decoration: none; }
        .login-btn:hover { background: var(--white); }
        .login-error { font-size: 12px; color: #f87171; margin-top: 10px; display: none; }

        .portal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 48px; }
        .portal-greeting { font-family: 'DM Serif Display', serif; font-size: clamp(32px, 5vw, 48px); line-height: 0.95; color: var(--platinum); }
        .logout-btn { font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(244,244,242,0.25); background: none; border: 0.5px solid rgba(244,244,242,0.1); padding: 8px 16px; cursor: none; transition: color 0.2s, border-color 0.2s; }
        .logout-btn:hover { color: var(--platinum); border-color: rgba(244,244,242,0.3); }

        .status-card { background: var(--smoke); border: 0.5px solid rgba(244,244,242,0.08); padding: 36px 40px; margin-bottom: 20px; }
        .status-row { display: flex; justify-content: space-between; padding: 14px 0; border-top: 0.5px solid rgba(244,244,242,0.07); font-size: 13px; }
        .status-badge { text-transform: uppercase; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; padding: 4px 12px; border: 0.5px solid rgba(244,244,242,0.2); }
        .badge-progress { color: #fbbf24; border-color: rgba(251, 191, 36, 0.4); background: rgba(251, 191, 36, 0.05); }
        .badge-complete { color: #4ade80; border-color: rgba(74, 222, 128, 0.4); background: rgba(74, 222, 128, 0.05); }

        .payment-card { background: rgba(244,244,242,0.02); border: 0.5px solid rgba(244,244,242,0.07); padding: 36px 40px; margin-bottom: 20px; }
        .payment-amount { font-family: 'DM Serif Display', serif; font-size: 64px; color: var(--platinum); }

        footer { border-top: 0.5px solid rgba(244,244,242,0.07); padding: 32px 56px; display: flex; justify-content: space-between; font-size: 10px; color: rgba(244,244,242,0.18); }

        @media (max-width: 640px) {
            nav, footer { padding: 24px; }
            .cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
    <a href="/index" class="nav-logo-word">JW/DIGITAL</a>
    <div class="nav-right"><i class="fa-solid fa-lock"></i> Client Portal</div>
</nav>

<main>
    <div class="screen active" id="loginScreen">
        <div class="screen-label">Client Portal</div>
        <h1 class="screen-headline">Welcome<br><em>Back.</em></h1>
        
        <form onsubmit="handleLogin(event)">
            <label for="emailInput" class="visually-hidden">Email Address</label>
            <input class="login-input" type="email" id="emailInput" placeholder="your@email.com" required>
            <button type="submit" class="login-btn" id="loginBtn">Access My Portal →</button>
            <div aria-live="polite">
                <p class="login-error" id="loginError">No project found for that email address.</p>
            </div>
        </form>
    </div>

    <div class="screen" id="portalScreen">
        <div class="portal-header">
            <div>
                <h1 class="portal-greeting" id="portalGreeting">Hello.</h1>
                <div id="portalBusiness" style="font-size:12px; color:var(--fog); margin-top:8px;"></div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>

        <div class="status-card">
            <div class="status-project" id="portalProject" style="font-family:'DM Serif Display', serif; font-size:26px; margin-bottom:20px;"></div>
            <div class="status-row"><span>Status</span><span id="statusBadge" class="status-badge"></span></div>
            <div class="status-row"><span>Deliverable</span><span id="portalDeliverable"></span></div>
            <div class="status-row"><span>Notes</span><span id="portalNotes" style="max-width:200px; text-align:right;"></span></div>
        </div>

        <div class="payment-card" id="paymentCard">
            <div style="font-size:9px; text-transform:uppercase; letter-spacing:0.2em; color:rgba(244,244,242,0.25); margin-bottom:15px;">Invoice</div>
            <div class="payment-amount" id="paymentAmount">$0</div>

            <div id="paymentStatus" style="margin-top:15px; font-size:12px; color:#4ade80; display:none;">
                <i class="fa-solid fa-circle-check"></i> Payment Confirmed
            </div>
        </div>
    </div>
</main>

<footer>
    <div>&copy; 2026 JW Digital</div>
    <a href="/index" style="color:inherit; text-decoration:none; transition: color 0.2s;" onmouseover="this.style.color='var(--platinum)'" onmouseout="this.style.color='rgba(244,244,242,0.18)'">← Back to Site</a>
</footer>

<script>
    // CURSOR LOGIC
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
    
    document.addEventListener('mouseover', e => {
        if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
            cursor.classList.add('active');
        }
    });

    document.addEventListener('mouseout', e => {
        if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
            cursor.classList.remove('active');
        }
    });

    // DATABASE LOGIC (STEIN)
    const STEIN_ID = "69da885bbb16885eb7bcf43d";
    const SHEET_NAME = "Clients"; 

    async function handleLogin(e) {
        if(e) e.preventDefault(); // Prevents page reload on form submit
        
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('loginError');

        if(!email) return;
        btn.innerText = "Searching...";

        try {
            const response = await fetch(`https://api.steinhq.com/v1/storages/${STEIN_ID}/${SHEET_NAME}`);
            const data = await response.json();

            const user = data.find(row => row.Email && row.Email.toLowerCase() === email);

            if (!user) {
                errorMsg.style.display = 'block';
                btn.innerText = "Access My Portal →";
                return;
            }

            errorMsg.style.display = 'none';
            showPortal(user);

        } catch (error) {
            console.error(error);
            alert("Connection error. Check your Stein ID or Sheet Name.");
            btn.innerText = "Access My Portal →";
        }
    }

    function showPortal(user) {
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('portalScreen').classList.add('active');

        // Extract first name safely
        const firstName = user.Name ? user.Name.split(' ')[0] : 'Client';
        document.getElementById('portalGreeting').innerHTML = `Hello, <em>${firstName}.</em>`;
        
        document.getElementById('portalBusiness').innerText = user.Business || "";
        document.getElementById('portalProject').innerText = user.Project || "Project Details";
        document.getElementById('portalDeliverable').innerText = user.Deliverable || "—";
        document.getElementById('portalNotes').innerText = user.Notes || "—";
        
        // Format amount with commas if necessary
        const amount = user.Amount ? Number(user.Amount).toLocaleString() : "0";
        document.getElementById('paymentAmount').innerText = `$${amount}`;

        const badge = document.getElementById('statusBadge');
        const status = user.Status || "Pending";
        badge.innerText = status;
        
        badge.className = "status-badge"; 
        if(status === "In Progress") badge.classList.add('badge-progress');
        if(status === "Complete") badge.classList.add('badge-complete');

        // --- SMART PAYMENT LOGIC ---
        const isPaid = String(user.Paid).toUpperCase() === "TRUE";
        const paymentStatus = document.getElementById('paymentStatus');
        const paymentCard = document.getElementById('paymentCard');
        
        // Remove existing button if it exists to prevent duplicates
        const oldBtn = document.getElementById('payBtn');
        if (oldBtn) oldBtn.remove();

        const customLink = user.Link || "https://buy.stripe.com/28E7sL1wkgPO7RN56BfQI00";

        if(isPaid) {
            paymentStatus.style.display = "block";
        } else {
            paymentStatus.style.display = "none";
            const newBtn = document.createElement('a');
            newBtn.id = "payBtn";
            newBtn.href = customLink;
            newBtn.target = "_blank";
            newBtn.className = "login-btn";
            newBtn.style.display = "inline-block";
            newBtn.style.textAlign = "center";
            newBtn.style.marginTop = "20px";
            newBtn.innerText = "Complete Payment →";
            
            // Add custom cursor events for dynamically created element
            newBtn.addEventListener('mouseenter', () => cursor.classList.add('active'));
            newBtn.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            
            paymentCard.appendChild(newBtn);
        }
    }

    function handleLogout() {
        location.reload();
    }
</script>

</body>
</html>
