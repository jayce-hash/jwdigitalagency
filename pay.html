<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Post — JW Digital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1A1A1A; --smoke: #2A2A2A; --silver: #C2C2C2;
    --platinum: #F4F4F2; --fog: #7A7A7A;
  }

  body { width: 1080px; height: 1080px; overflow: hidden; background: var(--ink); font-family: 'DM Sans', sans-serif; }

  .post {
    width: 1080px; height: 1080px;
    background: var(--ink);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px;
  }

  /* GRAIN */
  .grain {
    position: absolute; inset: 0; pointer-events: none; z-index: 10;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.04;
  }

  /* SUBTLE GRID */
  .grid-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(rgba(244,244,242,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,244,242,0.025) 1px, transparent 1px);
    background-size: 120px 120px;
  }

  /* TOP */
  .top { position: relative; z-index: 5; display: flex; justify-content: space-between; align-items: flex-start; }
  .top-label { font-size: 18px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(244,244,242,0.25); }

  /* CENTER — LOGO LOCKUP */
  .center { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
  .logo-rule { height: 0.5px; background: rgba(244,244,242,0.3); width: 480px; margin-bottom: 28px; }
  .logo-word {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 108px;
    letter-spacing: 0.04em;
    color: var(--platinum);
    line-height: 1;
    white-space: nowrap;
  }
  .logo-sub { font-size: 18px; font-weight: 300; letter-spacing: 0.42em; text-transform: uppercase; color: rgba(244,244,242,0.28); margin-top: 24px; }
  .logo-rule-bottom { height: 0.5px; background: rgba(244,244,242,0.1); width: 480px; margin-top: 28px; }

  /* BOTTOM */
  .bottom { position: relative; z-index: 5; display: flex; justify-content: space-between; align-items: flex-end; }
  .bottom-tagline { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 28px; color: rgba(244,244,242,0.5); line-height: 1.35; max-width: 480px; }
  .bottom-tagline span { color: var(--silver); }
  .bottom-right { text-align: right; }
  .bottom-url { font-size: 17px; font-weight: 300; color: rgba(244,244,242,0.25); letter-spacing: 0.08em; }
  .bottom-handle { font-size: 17px; font-weight: 400; color: rgba(244,244,242,0.35); letter-spacing: 0.06em; margin-top: 6px; }

  /* CORNER MARKS */
  .corner { position: absolute; z-index: 5; width: 32px; height: 32px; }
  .corner-tl { top: 80px; left: 80px; border-top: 0.5px solid rgba(244,244,242,0.15); border-left: 0.5px solid rgba(244,244,242,0.15); }
  .corner-tr { top: 80px; right: 80px; border-top: 0.5px solid rgba(244,244,242,0.15); border-right: 0.5px solid rgba(244,244,242,0.15); }
  .corner-bl { bottom: 80px; left: 80px; border-bottom: 0.5px solid rgba(244,244,242,0.15); border-left: 0.5px solid rgba(244,244,242,0.15); }
  .corner-br { bottom: 80px; right: 80px; border-bottom: 0.5px solid rgba(244,244,242,0.15); border-right: 0.5px solid rgba(244,244,242,0.15); }
</style>
</head>
<body>
<main class="post">
  <div class="grain"></div>
  <div class="grid-overlay"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <header class="top">
    <div class="top-label">Est. 2026</div>
  </header>

  <div class="center">
    <div class="logo-word">JW/DIGITAL</div>
    <div class="logo-sub">Brand &nbsp;&middot;&nbsp; Web &nbsp;&middot;&nbsp; Presence</div>
    <div class="logo-rule-bottom"></div>
  </div>

  <footer class="bottom">
    <div class="bottom-left">
      <div class="bottom-tagline">The digital presence<br>serious businesses <span>deserve.</span></div>
    </div>
    <div class="bottom-right">
      <div class="bottom-url">jwdigital.co</div>
      <div class="bottom-handle">@jwdigitalagency</div>
    </div>
  </footer>
</main>
</body>
</html>
