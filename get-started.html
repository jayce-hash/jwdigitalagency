<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | JW Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Reusing your root variables and core styles */
        :root {
            --ink: #0a0a0a; --paper: #ffffff; --surface: #fafafa; --blue: #1a4fff;
            --blue-light: #3b6bff; --muted: #6b6b6b; --border: #e5e5e5;
            --white: #ffffff; --green: #4ade80;
        }
        body { font-family: "DM Sans", sans-serif; background: var(--surface); color: var(--ink); margin: 0; }
        
        /* Layout */
        .checkout-nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: "Bebas Neue", sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--ink); text-decoration: none; }
        .nav-logo span { color: var(--blue); }
        .back-link { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; }

        .container { max-width: 800px; margin: 60px auto; padding: 0 24px; }
        .checkout-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Steps Header */
        .steps-header { background: var(--ink); padding: 40px; color: var(--white); }
        .steps-title { font-family: "Bebas Neue", sans-serif; font-size: 32px; letter-spacing: 2px; margin-bottom: 20px; }
        .modal-steps { display: flex; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .modal-step { flex: 1; padding: 12px; text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1); }
        .modal-step.active { background: var(--blue); color: var(--white); }
        .modal-step.done { color: var(--green); }

        .checkout-body { padding: 40px; }
        
        /* Re-incorporate all your form, service-option, and button CSS from the original file here */
        /* ... (Include .intake-form, .service-option, .zelle-box, etc. from your original <style> tag) ... */
        
        .step-panel { display: none; }
        .step-panel.active { display: block; }
        
        /* Your existing form/button styles (minified for brevity) */
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .form-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
        .form-input, .form-textarea { background: var(--surface); border: 1.5px solid var(--border); border-radius: 4px; padding: 12px; font-family: inherit; }
        .service-option { display: flex; align-items: center; gap: 16px; padding: 14px; border: 1.5px solid var(--border); border-radius: 6px; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
        .service-option.selected { border-color: var(--blue); background: #f0f4ff; }
        .form-submit-btn, .modal-confirm-btn { width: 100%; background: var(--blue); color: white; padding: 18px; border-radius: 4px; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .service-option-price { font-family: "Bebas Neue", sans-serif; font-size: 20px; color: var(--blue); margin-left: auto; }
    </style>
</head>
<body>

    <nav class="checkout-nav">
        <a href="index.html" class="nav-logo">JW<span>DIGITAL</span></a>
        <a href="index.html" class="back-link">&larr; Back to Home</a>
    </nav>

    <div class="container">
        <div class="checkout-card">
            <div class="steps-header">
                <div class="steps-title" id="pageTitle">Start Your Project</div>
                <div class="modal-steps">
                    <div class="modal-step active" id="step-ind-1">1. Your Info</div>
                    <div class="modal-step" id="step-ind-2">2. Payment</div>
                    <div class="modal-step" id="step-ind-3">3. Confirmed</div>
                </div>
            </div>

            <div class="checkout-body">
                <div class="step-panel active" id="step1">
                    <form class="intake-form" id="intakeForm" onsubmit="handleSubmit(event)">
                        <div class="form-group">
                            <label class="form-label">What do you need? *</label>
                            <div class="service-option" data-service="Website Build" data-price="750" onclick="toggleService(this)">
                                <div class="service-option-info"><strong>Website Build</strong><br><small>Custom 5-section site</small></div>
                                <span class="service-option-price">$750</span>
                            </div>
                            </div>
                        
                        <div class="form-group">
                            <label class="form-label">Full Name *</label>
                            <input type="text" class="form-input" required name="full-name" placeholder="Joe Smith">
                        </div>
                        <button type="submit" class="form-submit-btn">Continue to Payment &rarr;</button>
                    </form>
                </div>

                <div class="step-panel" id="step2">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <p class="form-label">Total Amount</p>
                        <h2 style="font-family: 'Bebas Neue'; font-size: 48px;" id="depositAmount">$0</h2>
                    </div>
                    <div id="stripe-card-element" style="padding: 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface);"></div>
                    <div id="stripe-card-errors" style="color: red; font-size: 12px; margin-top: 10px;"></div>
                    <button class="modal-confirm-btn" style="margin-top: 20px;" onclick="handleStripePayment()">Pay and Lock In Order</button>
                </div>

                <div class="step-panel" id="step3">
                    <div style="text-align: center;">
                        <i class="fa-solid fa-circle-check" style="font-size: 48px; color: var(--green);"></i>
                        <h2 style="font-family: 'Bebas Neue'; font-size: 32px; margin: 20px 0;">Success!</h2>
                        <p>I've received your info and payment. Check your email for a confirmation.</p>
                        <a href="index.html" class="back-link" style="display: block; margin-top: 20px;">Return to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Copy your existing JS logic here, but remove the modal open/close functions.
        // Ensure setStep(n) is used to toggle the active panels.
    </script>
</body>
</html>
